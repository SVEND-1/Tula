services:
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    networks:
      - app-network

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"  # API порт (для приложения)
      - "9001:9001"  # Web UI порт (консоль администратора)
    environment:
      - MINIO_ROOT_USER=minioadmin       # Логин для веб-интерфейса
      - MINIO_ROOT_PASSWORD=minioadmin  # Пароль
      - MINIO_DOMAIN=localhost           # Домен для виртуального хостинга
      - MINIO_SERVER_URL=http://localhost:9000  # URL сервера
    volumes:
      - ./minio/data:/data              # Данные хранятся локально
      - ./minio/config:/root/.minio     # Конфигурация
    command: server /data --console-address ":9001"
    networks:
      - app-network

volumes:
  minio-data:
    driver: local

networks:
  app-network:
    driver: bridge